version: '3.8'

services:
  scraper:
    build: .
    container_name: funeral-scraper
    depends_on:
      - tor
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul
      - TOR_ENABLED=true
      - TOR_HOST=tor  # ← localhost 대신 tor 서비스명 사용
      - TOR_PORT=9050
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tor:
    image: peterdavehello/tor-socks-proxy:latest
    container_name: funeral-tor
    ports:
      - "9050:9050"
    restart: unless-stopped
