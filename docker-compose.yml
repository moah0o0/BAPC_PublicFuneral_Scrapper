version: '3.8'

services:
  scraper:
    build: .
    container_name: funeral-scraper
    depends_on:
      - tor
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul
      - TOR_ENABLED=true
      - TOR_HOST=tor
      - TOR_PORT=9150  # ← 9050에서 9150으로 변경
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tor:
    image: peterdavehello/tor-socks-proxy:latest
    container_name: funeral-tor
    ports:
      - "9150:9150"  # ← 9050:9050에서 9150:9150으로 변경
    restart: unless-stopped
